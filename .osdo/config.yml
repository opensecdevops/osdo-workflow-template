# OSDO Framework Configuration
# This file contains default configurations for OSDO security and compliance checks

# Test Coverage Configuration
test:
  coverage:
    minimum: 80
    format: 'lcov'
    exclude:
      - 'test/**'
      - 'tests/**'
      - '**/*.test.js'
      - '**/*.spec.js'
      - 'node_modules/**'

# Security Scan Configuration
security:
  dependency_scan:
    enabled: true
    exclude_dev: false
    severity_threshold: 'moderate'
  
  secrets_scan:
    enabled: true
    exclude_paths:
      - '.git/**'
      - 'node_modules/**'
      - '**/*.log'
  
  static_analysis:
    enabled: true
    languages:
      - javascript
      - typescript
      - python
    rules:
      - 'security'
      - 'owasp-top-10'

# Quality Gates
quality_gates:
  security_score:
    minimum: 70
    fail_on_high_severity: true
  
  test_coverage:
    minimum: 80
    fail_below_threshold: false
  
  vulnerabilities:
    critical_threshold: 0
    high_threshold: 5
    secrets_threshold: 0
  
  compliance:
    required_checks:
      - 'dependency_scan'
      - 'secrets_scan'
      - 'static_analysis'
      - 'test_coverage'
      - 'build_security'
      - 'sbom_generation'

# Reporting Configuration
reporting:
  formats:
    - 'markdown'
    - 'sarif'
  
  upload_to_security_tab: true
  comment_on_pr: true
  
  artifacts:
    retention_days:
      test_results: 30
      security_results: 90
      compliance_reports: 365

# Tool Configurations
tools:
  semgrep:
    config: 'auto'
    rules:
      - 'p/security-audit'
      - 'p/javascript'
      - 'p/typescript'
  
  eslint:
    plugins:
      - 'security'
      - 'react-hooks'
    rules:
      security: 'error'
  
  trufflehog:
    verified: true
    include_detectors:
      - 'all'

# Build Security Configuration
build_security:
  sbom:
    formats:
      - 'json'
      - 'xml'
    tools:
      - 'cyclonedx'
  
  verification:
    enabled: true
    check_integrity: true
    validate_outputs: true
  
  build_commands:
    node: 'npm run build'
    python: 'python -m build'
