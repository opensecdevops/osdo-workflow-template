name: 🚀 Publish Release

on:
  workflow_dispatch:
    inputs:
      action_name:
        description: 'Action name (e.g., security-scan, setup-osdo)'
        required: true
        type: choice
        options:
          - setup-osdo
          - test-quality
          - security-scan
          - build-security
          - security-quality-gate
          - compliance-report
      version:
        description: 'Version (e.g., 1.0.0, 1.1.0, 2.0.0)'
        required: true
        type: string
      is_breaking_change:
        description: 'Is this a breaking change? (Major version)'
        required: false
        type: boolean
        default: false
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  validate-and-publish:
    name: Validate & Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        run: |
          # Validate version format
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Use MAJOR.MINOR.PATCH (e.g., 1.0.0)"
            exit 1
          fi
          
          # Validate action exists
          ACTION_PATH=".github/actions/${{ inputs.action_name }}"
          if [ ! -f "$ACTION_PATH/action.yml" ]; then
            echo "Action not found: $ACTION_PATH/action.yml"
            exit 1
          fi
          
          echo "Version format valid"
          echo "Action found: ${{ inputs.action_name }}"
          echo "Release tag: ${{ inputs.action_name }}/v${{ inputs.version }}"

      - name: Check tag doesn't exist
        run: |
          TAG="${{ inputs.action_name }}/v${{ inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
            exit 1
          fi
          echo "Tag is unique: $TAG"

      - name: Validate action.yml structure
        run: |
          ACTION_YML=".github/actions/${{ inputs.action_name }}/action.yml"
          
          # Check required fields
          if ! grep -q "^name:" "$ACTION_YML"; then
            echo "Missing 'name' field in action.yml"
            exit 1
          fi
          
          if ! grep -q "^description:" "$ACTION_YML"; then
            echo "Missing 'description' field in action.yml"
            exit 1
          fi
          
          if ! grep -q "^runs:" "$ACTION_YML"; then
            echo "Missing 'runs' field in action.yml"
            exit 1
          fi
          
          echo "action.yml has required fields"

      - name: Update CHANGELOG
        run: |
          VERSION="${{ inputs.version }}"
          ACTION="${{ inputs.action_name }}"
          BREAKING="${{ inputs.is_breaking_change }}"
          RELEASE_NOTES="${{ inputs.release_notes }}"
          
          # Check if CHANGELOG already has this version
          if grep -q "### $ACTION" CHANGELOG.md && grep -q "#### v$VERSION" CHANGELOG.md; then
            echo "Version already documented in CHANGELOG"
          else
            echo "CHANGELOG was checked (update manually if needed)"
            echo "   Add entry for: $ACTION/v$VERSION"
          fi

      - name: Create and push tag
        run: |
          TAG="${{ inputs.action_name }}/v${{ inputs.version }}"
          ACTION="${{ inputs.action_name }}"
          VERSION="${{ inputs.version }}"
          BREAKING="${{ inputs.is_breaking_change }}"
          RELEASE_NOTES="${{ inputs.release_notes }}"
          
          # Build tag message
          MESSAGE="Release: $ACTION v$VERSION"
          
          if [ "$BREAKING" == "true" ]; then
            MESSAGE="$MESSAGE (BREAKING CHANGE)"
          fi
          
          if [ -n "$RELEASE_NOTES" ]; then
            MESSAGE="$MESSAGE
          $RELEASE_NOTES"
          fi
          
          # Create annotated tag
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG" -m "$MESSAGE" HEAD
          git push origin "$TAG"
          
          echo "Tag created and pushed: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.action_name }}/v${{ inputs.version }}
          name: 'Release: ${{ inputs.action_name }} v${{ inputs.version }}'
          body: |
            ## Action: `${{ inputs.action_name }}`
            
            **Version**: v${{ inputs.version }}
            
            ### Details
            
            - **Action**: `.github/actions/${{ inputs.action_name }}/`
            - **Version**: `${{ inputs.version }}`
            - **Breaking Change**: ${{ inputs.is_breaking_change == true && 'Yes' || 'No' }}
            
            ### Usage
            
            ```yaml
            - uses: opensecdevops/osdo-workflow-template/.github/actions/${{ inputs.action_name }}@${{ inputs.action_name }}/v${{ inputs.version }}
            ```
            
            ${{ inputs.release_notes && format('### Notes\n\n{0}', inputs.release_notes) || '' }}
            
            ---
            
            See [CHANGELOG.md](https://github.com/opensecdevops/osdo-workflow-template/blob/main/CHANGELOG.md) for all changes.
            
            See [PUBLISHING_GUIDE.md](https://github.com/opensecdevops/osdo-workflow-template/blob/main/docs/PUBLISHING_GUIDE.md) for versioning guidelines.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "Release Published Successfully!"
          echo ""
          echo "Details:"
          echo "  - Action: ${{ inputs.action_name }}"
          echo "  - Version: v${{ inputs.version }}"
          echo "  - Tag: ${{ inputs.action_name }}/v${{ inputs.version }}"
          echo "  - Breaking Change: ${{ inputs.is_breaking_change }}"
          echo ""
          echo "Usage Reference:"
          echo "  uses: opensecdevops/osdo-workflow-template/.github/actions/${{ inputs.action_name }}@${{ inputs.action_name }}/v${{ inputs.version }}"
          echo ""
          echo "Documentation:"
          echo "  - Publishing Guide: docs/PUBLISHING_GUIDE.md"
          echo "  - Usage in Other Repos: docs/USAGE_IN_OTHER_REPOS.md"
          echo "  - Changelog: CHANGELOG.md"

      - name: Post summary to PR
        if: always()
        run: |
          echo "Release workflow completed successfully"
