name: 🛡️ OSDO CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run tests and quality checks'
        required: true
        default: true
        type: boolean
      run_security_scan:
        description: 'Run security scans'
        required: true
        default: true
        type: boolean
      run_static_analysis:
        description: 'Run static analysis'
        required: true
        default: true
        type: boolean
      run_secrets_scan:
        description: 'Run secrets detection'
        required: true
        default: true
        type: boolean
      run_build_security:
        description: 'Run secure build and SBOM generation'
        required: true
        default: true
        type: boolean
      test_coverage_threshold:
        description: 'Minimum test coverage percentage'
        required: false
        default: '80'
        type: string
      node_version:
        description: 'Node.js version to use'
        required: false
        default: '22'
        type: string
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main ]
  schedule:
    # Ejecutar análisis de seguridad semanalmente
    - cron: '0 2 * * 1'

concurrency:
  group: 'osdo-compliance-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  osdo-pipeline:
    name: 🛡️ OSDO Security & Compliance Pipeline
    uses: ./.github/workflows/osdo-framework.yml
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    with:
      # Environment Configuration
      node-version: ${{ inputs.node_version || '22' }}
      python-version: '3.11'
      
      # Pipeline Control
      run-tests: ${{ inputs.run_tests != false }}
      run-security-scan: ${{ inputs.run_security_scan != false }}
      run-compliance-report: true
      
      # Quality Configuration
      test-coverage-threshold: ${{ inputs.test_coverage_threshold || '80' }}
      fail-on-high-security: true
      
      # Test Configuration
      enable-unit-tests: ${{ inputs.run_tests != false }}
      enable-integration-tests: ${{ inputs.run_tests != false }}
      enable-e2e-tests: false
      
      # Security Configuration
      enable-dependency-scan: ${{ inputs.run_security_scan != false }}
      enable-secrets-scan: ${{ inputs.run_secrets_scan != false }}
      enable-static-analysis: ${{ inputs.run_static_analysis != false }}
      enable-container-scan: ${{ inputs.run_build_security != false }}
      
      # Build Security Configuration
      enable-build-security: ${{ inputs.run_build_security != false }}
      sbom-format: 'both'
      build-command: 'npm run build'
      
      # Quality Gate Configuration
      enable-quality-gate: true
      critical-threshold: '0'
      high-threshold: '10'
      secrets-threshold: '0'
      
      # Report Configuration
      report-format: 'markdown'

  # Job adicional para procesar resultados específicos del proyecto
  post-processing:
    name: 📊 Post-Processing
    runs-on: ubuntu-latest
    needs: osdo-pipeline
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Display OSDO Results Summary
        run: |
          echo "🛡️ OSDO Pipeline Completed"
          echo "================================"
          echo "Compliance Status: ${{ needs.osdo-pipeline.outputs.compliance-status }}"
          echo "Security Score: ${{ needs.osdo-pipeline.outputs.security-score }}/100"
          echo "Test Coverage: ${{ needs.osdo-pipeline.outputs.test-coverage }}%"
          echo "Vulnerabilities Found: ${{ needs.osdo-pipeline.outputs.vulnerabilities-found }}"
          echo "Quality Gate Status: ${{ needs.osdo-pipeline.outputs.quality-gate-status }}"
          echo "Build Verification: ${{ needs.osdo-pipeline.outputs.build-verification }}"
          echo "================================"
          
          # Set pipeline status based on compliance
          if [ "${{ needs.osdo-pipeline.outputs.compliance-status }}" = "NON_COMPLIANT" ]; then
            echo "::error::OSDO Pipeline failed - Non-compliant status"
            exit 1
          fi

      - name: Create deployment gate
        if: github.ref == 'refs/heads/main' && needs.osdo-pipeline.outputs.compliance-status == 'COMPLIANT'
        run: |
          echo "✅ OSDO Quality Gate PASSED - Ready for deployment"
          echo "OSDO_DEPLOYMENT_APPROVED=true" >> $GITHUB_ENV
