name: 'OSDO Secrets Scan'
description: 'Scans for secrets in code and git history'
inputs:
  results-dir:
    description: 'Directory to store SARIF results'
    required: true
outputs:
  sarif-files:
    description: 'Generated SARIF files for secrets'
    value: ${{ steps.secrets.outputs.sarif-files }}
runs:
  using: 'composite'
  steps:
    # Cache Docker images for secrets scanning
    - name: Cache Docker images
      uses: actions/cache@v4
      with:
        path: |
          ~/docker-cache
        key: ${{ runner.os }}-docker-secrets-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-docker-secrets-
    
    # Pre-pull Docker images to cache them
    - name: Pull Gitleaks Docker image
      shell: bash
      run: |
        docker pull zricethezav/gitleaks:latest || true
    
    - name: Pull TruffleHog Docker image
      shell: bash
      run: |
        docker pull trufflesecurity/trufflehog:latest || true
    
    - name: Run Secrets scans
      id: secrets
      shell: bash
      run: |
        sarif_files=""
        
        echo "--- Running Secrets Scan with Gitleaks ---"
        docker run --rm -v "$(pwd):/path" zricethezav/gitleaks:latest detect --source="/path" --report-format=sarif --report-path=/path/${{ inputs.results-dir }}/gitleaks.sarif || true
        sarif_files="${{ inputs.results-dir }}/gitleaks.sarif"
        
        echo "--- Running Secrets Scan with TruffleHog ---"
        docker run --rm -v "$(pwd):/pwd" trufflesecurity/trufflehog:latest filesystem /pwd --sarif > ${{ inputs.results-dir }}/trufflehog.sarif || true
        sarif_files="$sarif_files,${{ inputs.results-dir }}/trufflehog.sarif"
        
        echo "sarif-files=${sarif_files#,}" >> $GITHUB_OUTPUT
