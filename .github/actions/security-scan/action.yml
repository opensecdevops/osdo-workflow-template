name: 'OSDO Security Scan'
description: 'Comprehensive security scanning including dependencies, secrets, and static analysis'
inputs:
  enable-dependency-scan:
    description: 'Enable dependency vulnerability scanning'
    required: false
    default: 'true'
  enable-secrets-scan:
    description: 'Enable secrets detection'
    required: false
    default: 'true'
  enable-static-analysis:
    description: 'Enable static application security testing'
    required: false
    default: 'true'
  enable-container-scan:
    description: 'Enable container security scanning'
    required: false
    default: 'false'
  fail-on-high:
    description: 'Fail pipeline on high severity vulnerabilities'
    required: false
    default: 'true'

outputs:
  vulnerabilities-found:
    description: 'Number of vulnerabilities found'
    value: ${{ steps.summary.outputs.total-vulns }}
  security-score:
    description: 'Overall security score'
    value: ${{ steps.summary.outputs.security-score }}
  sarif-files:
    description: 'Generated SARIF files'
    value: ${{ steps.summary.outputs.sarif-files }}

runs:
  using: 'composite'
  steps:
    - name: Dependency vulnerability scan
      if: inputs.enable-dependency-scan == 'true'
      shell: bash
      run: |
        # NPM Audit for Node.js projects
        if [ -f package.json ]; then
          npm audit --audit-level=moderate --json > $OSDO_RESULTS_DIR/npm-audit.json || true
          # Convert to SARIF
          npx audit-ci --config .osdo/audit-ci.json --output-format sarif --output $OSDO_RESULTS_DIR/dependency-scan.sarif || true
        fi
        
        # Safety for Python projects
        if [ -f requirements.txt ]; then
          pip install safety
          safety check --json --output $OSDO_RESULTS_DIR/safety-report.json || true
        fi
        
        # Snyk scan
        if command -v snyk &> /dev/null; then
          snyk test --json > $OSDO_RESULTS_DIR/snyk-report.json || true
          snyk code test --sarif > $OSDO_RESULTS_DIR/snyk-code.sarif || true
        fi

    - name: Secrets detection
      if: inputs.enable-secrets-scan == 'true'
      shell: bash
      run: |
        # TruffleHog
        docker run --rm -v "$(pwd):/pwd" trufflesecurity/trufflehog:latest \
          filesystem /pwd --json > $OSDO_RESULTS_DIR/trufflehog-secrets.json || true
        
        # GitLeaks
        docker run --rm -v "$(pwd):/path" zricethezav/gitleaks:latest \
          detect --source="/path" --report-format=sarif --report-path=/path/$OSDO_RESULTS_DIR/gitleaks.sarif || true

    - name: Static application security testing
      if: inputs.enable-static-analysis == 'true'
      shell: bash
      run: |
        # Semgrep
        docker run --rm \
          -v "$(pwd):/src" \
          -v "$(pwd)/$OSDO_RESULTS_DIR:/results" \
          returntocorp/semgrep:latest \
          semgrep --sarif --output /results/semgrep.sarif /src || true
        
        # ESLint Security for JavaScript/TypeScript
        if [ -f package.json ]; then
          npm install --no-save eslint @microsoft/eslint-formatter-sarif eslint-plugin-security
          npx eslint . --format @microsoft/eslint-formatter-sarif \
            --output-file $OSDO_RESULTS_DIR/eslint-security.sarif || true
        fi
        
        # Bandit for Python
        if [ -f requirements.txt ] || [ -f setup.py ]; then
          pip install bandit[toml]
          bandit -r . -f sarif -o $OSDO_RESULTS_DIR/bandit.sarif || true
        fi

    - name: Container security scan
      if: inputs.enable-container-scan == 'true'
      shell: bash
      run: |
        if [ -f Dockerfile ]; then
          # Trivy container scan
          docker run --rm -v "$(pwd):/workspace" \
            aquasec/trivy:latest fs /workspace \
            --format sarif --output /workspace/$OSDO_RESULTS_DIR/trivy-container.sarif || true
          
          # Hadolint Dockerfile linting
          docker run --rm -i hadolint/hadolint < Dockerfile > $OSDO_RESULTS_DIR/hadolint.txt || true
        fi

    - name: Process security results
      shell: bash
      id: summary
      run: |
        total_vulns=0
        sarif_files=""
        
        # Count vulnerabilities from SARIF files
        for sarif_file in $OSDO_RESULTS_DIR/*.sarif; do
          if [ -f "$sarif_file" ]; then
            sarif_files="$sarif_files,$sarif_file"
            vulns=$(jq '[.runs[].results[]] | length' "$sarif_file" 2>/dev/null || echo "0")
            total_vulns=$((total_vulns + vulns))
          fi
        done
        
        # Calculate security score (simple algorithm)
        if [ $total_vulns -eq 0 ]; then
          security_score=100
        elif [ $total_vulns -le 5 ]; then
          security_score=90
        elif [ $total_vulns -le 15 ]; then
          security_score=70
        else
          security_score=50
        fi
        
        echo "total-vulns=$total_vulns" >> $GITHUB_OUTPUT
        echo "security-score=$security_score" >> $GITHUB_OUTPUT
        echo "sarif-files=${sarif_files#,}" >> $GITHUB_OUTPUT
        
        # Fail if high severity vulnerabilities and fail-on-high is true
        if [ "${{ inputs.fail-on-high }}" = "true" ] && [ $total_vulns -gt 10 ]; then
          echo "::error::Security scan failed: $total_vulns vulnerabilities found"
          exit 1
        fi
